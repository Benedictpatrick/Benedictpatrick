    <!-- Badges -->
    <g transform="translate(180, 8)" class="badge-group">
      <rect width="76" height="28" rx="6" class="badge-rect"/>
      <circle cx="14" cy="14" r="2.5" class="dot-indicator" fill="#3b82f6"/>
      <text x="26" y="18" class="badge-text">Python</text>
    </g>
    <g transform="translate(266, 8)" class="badge-group">
