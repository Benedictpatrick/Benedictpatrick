      <g transform="translate(8, 6) scale(0.8)" class="logo-icon">
        <ellipse cx="10" cy="5" rx="7" ry="2" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
        <path d="M3,5 L3,10 A7,2 0 0,0 17,10 L17,5" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
