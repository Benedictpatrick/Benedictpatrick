        <path d="M12 9h2v2h-2v2h-2v-2h-2V9h2V7h2v2zm5 0h2v2h-2v2h-2v-2h-2V9h2V7h2v2z" fill="#60a5fa" transform="scale(0.8) translate(3, 1)"/>
