<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <radialGradient id="stackBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#0d1527;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#070709;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020203;stop-opacity:1"/>
    </radialGradient>

    <linearGradient id="badgeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>

    <!-- Hover glow filter -->
    <filter id="hoverGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .cat-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        font-weight: 700;
        fill: #3b82f6;
        letter-spacing: 1.5px;
      }
      .badge-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 11.5px;
        font-weight: 500;
        fill: #f8fafc;
      }
      .badge-rect {
        fill: url(#badgeBg);
        stroke: #30363d;
        stroke-width: 0.8;
        transition: all 0.3s ease;
      }
      .badge-group {
        cursor: pointer;
      }
      .badge-group:hover .badge-rect {
        stroke: #3b82f6;
        fill: #1f2937;
        filter: url(#hoverGlow);
      }
      .badge-group:hover .badge-text {
        fill: #60a5fa;
      }
      .logo-icon {
        opacity: 0.85;
        transition: opacity 0.3s;
      }
      .badge-group:hover .logo-icon {
        opacity: 1;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#stackBg)" rx="16" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ==================== ROW 1: LANGUAGES ==================== -->
  <g transform="translate(30, 40)">
    <text x="0" y="24" class="cat-title">LANGUAGES</text>
    <line x1="0" y1="36" x2="840" y2="36" stroke="#1e293b" stroke-width="0.8" opacity="0.4"/>
    
    <!-- Python -->
