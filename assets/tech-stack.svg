        <path d="M9 2a5 5 0 00-5 5v2a5 5 0 005 5h1v-1a4 4 0 014-4h2V7a5 5 0 00-5-5H9z" fill="#3b82f6"/>
        <path d="M15 14a5 5 0 005-5v-2a5 5 0 00-5-5h-1v1a4 4 0 01-4 4H8v2a5 5 0 005 5h2z" fill="#60a5fa"/>
