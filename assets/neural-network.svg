<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>

    <style>
      @media (prefers-color-scheme: light) {
        rect[fill="#080808"] { fill: #f8fafc !important; }
        path[stroke="#1e293b"] { stroke: #cbd5e1 !important; }
        path[stroke="#30363d"] { stroke: #e2e8f0 !important; }
        text[fill="#4b5563"] { fill: #64748b !important; }
      }
    </style>

    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#3b82f6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="nodePulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#93c5fd;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>

    <filter id="nodeFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="connectionGlow">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#080808"/>

  <!-- Layer 1: Input nodes -->
  <!-- Node 1-1 -->
  <g filter="url(#nodeFilter)">
    <circle cx="100" cy="100" r="14" fill="url(#nodeGlow)" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="100" r="6" fill="url(#nodePulse)">
      <animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 1-2 -->
  <g filter="url(#nodeFilter)">
    <circle cx="100" cy="200" r="12" fill="url(#nodeGlow)" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="200" r="5" fill="url(#nodePulse)">
      <animate attributeName="r" values="5;7;5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 1-3 -->
  <g filter="url(#nodeFilter)">
    <circle cx="100" cy="300" r="13" fill="url(#nodeGlow)" opacity="0.75">
      <animate attributeName="opacity" values="0.75;0.35;0.75" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="300" r="6" fill="url(#nodePulse)">
      <animate attributeName="r" values="6;8;6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 1-4 -->
  <g filter="url(#nodeFilter)">
    <circle cx="100" cy="400" r="11" fill="url(#nodeGlow)" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.25;0.55" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="400" r="5" fill="url(#nodePulse)">
      <animate attributeName="r" values="5;7;5" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Layer 2: Hidden layer 1 -->
  <!-- Node 2-1 -->
  <g filter="url(#nodeFilter)">
    <circle cx="260" cy="80" r="16" fill="url(#nodeGlow)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="80" r="7" fill="url(#nodePulse)">
      <animate attributeName="r" values="7;10;7" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 2-2 -->
  <g filter="url(#nodeFilter)">
    <circle cx="260" cy="180" r="14" fill="url(#nodeGlow)" opacity="0.65">
      <animate attributeName="opacity" values="0.65;0.35;0.65" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="180" r="6" fill="url(#nodePulse)">
      <animate attributeName="r" values="6;9;6" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 2-3 -->
  <g filter="url(#nodeFilter)">
    <circle cx="260" cy="280" r="15" fill="url(#nodeGlow)" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="280" r="7" fill="url(#nodePulse)">
      <animate attributeName="r" values="7;9;7" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 2-4 -->
  <g filter="url(#nodeFilter)">
    <circle cx="260" cy="370" r="12" fill="url(#nodeGlow)" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="370" r="5" fill="url(#nodePulse)">
      <animate attributeName="r" values="5;8;5" dur="5.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 2-5 -->
  <g filter="url(#nodeFilter)">
    <circle cx="260" cy="460" r="11" fill="url(#nodeGlow)" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="460" r="5" fill="url(#nodePulse)">
      <animate attributeName="r" values="5;7;5" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Layer 3: Hidden layer 2 -->
  <!-- Node 3-1 -->
  <g filter="url(#nodeFilter)">
    <circle cx="430" cy="120" r="18" fill="url(#nodeGlow)" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.45;0.85" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="120" r="8" fill="url(#nodePulse)">
      <animate attributeName="r" values="8;12;8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 3-2 -->
  <g filter="url(#nodeFilter)">
    <circle cx="430" cy="230" r="15" fill="url(#nodeGlow)" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.35;0.7" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="230" r="7" fill="url(#nodePulse)">
      <animate attributeName="r" values="7;10;7" dur="3.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 3-3 -->
  <g filter="url(#nodeFilter)">
    <circle cx="430" cy="340" r="16" fill="url(#nodeGlow)" opacity="0.75">
      <animate attributeName="opacity" values="0.75;0.4;0.75" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="340" r="7" fill="url(#nodePulse)">
      <animate attributeName="r" values="7;11;7" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 3-4 -->
  <g filter="url(#nodeFilter)">
    <circle cx="430" cy="430" r="13" fill="url(#nodeGlow)" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.28;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="430" r="6" fill="url(#nodePulse)">
      <animate attributeName="r" values="6;9;6" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Layer 4: Hidden layer 3 -->
  <!-- Node 4-1 -->
  <g filter="url(#nodeFilter)">
    <circle cx="590" cy="150" r="16" fill="url(#nodeGlow)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="590" cy="150" r="7" fill="url(#nodePulse)">
      <animate attributeName="r" values="7;10;7" dur="2.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 4-2 -->
  <g filter="url(#nodeFilter)">
    <circle cx="590" cy="270" r="14" fill="url(#nodeGlow)" opacity="0.68">
      <animate attributeName="opacity" values="0.68;0.34;0.68" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="590" cy="270" r="6" fill="url(#nodePulse)">
      <animate attributeName="r" values="6;9;6" dur="3.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 4-3 -->
  <g filter="url(#nodeFilter)">
    <circle cx="590" cy="390" r="15" fill="url(#nodeGlow)" opacity="0.72">
      <animate attributeName="opacity" values="0.72;0.36;0.72" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="590" cy="390" r="7" fill="url(#nodePulse)">
      <animate attributeName="r" values="7;10;7" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Layer 5: Output nodes -->
  <!-- Node 5-1 -->
  <g filter="url(#nodeFilter)">
    <circle cx="720" cy="180" r="18" fill="url(#nodeGlow)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="180" r="8" fill="url(#nodePulse)">
      <animate attributeName="r" values="8;13;8" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 5-2 -->
  <g filter="url(#nodeFilter)">
    <circle cx="720" cy="320" r="16" fill="url(#nodeGlow)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="320" r="7" fill="url(#nodePulse)">
      <animate attributeName="r" values="7;11;7" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CONNECTIONS: Layer 1 -> Layer 2 -->
  <g opacity="0.2" stroke="#3b82f6" stroke-width="0.8">
    <!-- From node 1-1 (100,100) to all layer 2 -->
    <line x1="100" y1="100" x2="260" y2="80"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/></line>
    <line x1="100" y1="100" x2="260" y2="180"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="4s" repeatCount="indefinite"/></line>
    <line x1="100" y1="100" x2="260" y2="280"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="5s" repeatCount="indefinite"/></line>
    <line x1="100" y1="100" x2="260" y2="370"><animate attributeName="opacity" values="0.1;0.35;0.1" dur="6s" repeatCount="indefinite"/></line>
    <!-- From node 1-2 (100,200) to all layer 2 -->
    <line x1="100" y1="200" x2="260" y2="80"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.5s" repeatCount="indefinite"/></line>
    <line x1="100" y1="200" x2="260" y2="180"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.8s" repeatCount="indefinite"/></line>
    <line x1="100" y1="200" x2="260" y2="280"><animate attributeName="opacity" values="0.2;0.55;0.2" dur="3.8s" repeatCount="indefinite"/></line>
    <line x1="100" y1="200" x2="260" y2="370"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="5.5s" repeatCount="indefinite"/></line>
    <!-- From node 1-3 (100,300) to all layer 2 -->
    <line x1="100" y1="300" x2="260" y2="180"><animate attributeName="opacity" values="0.15;0.45;0.15" dur="4s" repeatCount="indefinite"/></line>
    <line x1="100" y1="300" x2="260" y2="280"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.2s" repeatCount="indefinite"/></line>
    <line x1="100" y1="300" x2="260" y2="370"><animate attributeName="opacity" values="0.2;0.55;0.2" dur="3.7s" repeatCount="indefinite"/></line>
    <line x1="100" y1="300" x2="260" y2="460"><animate attributeName="opacity" values="0.1;0.38;0.1" dur="5s" repeatCount="indefinite"/></line>
    <!-- From node 1-4 (100,400) to all layer 2 -->
    <line x1="100" y1="400" x2="260" y2="280"><animate attributeName="opacity" values="0.12;0.42;0.12" dur="4.5s" repeatCount="indefinite"/></line>
    <line x1="100" y1="400" x2="260" y2="370"><animate attributeName="opacity" values="0.18;0.52;0.18" dur="3.3s" repeatCount="indefinite"/></line>
    <line x1="100" y1="400" x2="260" y2="460"><animate attributeName="opacity" values="0.22;0.6;0.22" dur="2.9s" repeatCount="indefinite"/></line>
  </g>

  <!-- CONNECTIONS: Layer 2 -> Layer 3 -->
  <g opacity="0.18" stroke="#60a5fa" stroke-width="0.8">
    <line x1="260" y1="80" x2="430" y2="120"><animate attributeName="opacity" values="0.18;0.55;0.18" dur="3.1s" repeatCount="indefinite"/></line>
    <line x1="260" y1="80" x2="430" y2="230"><animate attributeName="opacity" values="0.12;0.4;0.12" dur="4.1s" repeatCount="indefinite"/></line>
    <line x1="260" y1="80" x2="430" y2="340"><animate attributeName="opacity" values="0.08;0.3;0.08" dur="5.1s" repeatCount="indefinite"/></line>
    <line x1="260" y1="180" x2="430" y2="120"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.6s" repeatCount="indefinite"/></line>
    <line x1="260" y1="180" x2="430" y2="230"><animate attributeName="opacity" values="0.2;0.58;0.2" dur="2.9s" repeatCount="indefinite"/></line>
    <line x1="260" y1="180" x2="430" y2="340"><animate attributeName="opacity" values="0.12;0.42;0.12" dur="4.6s" repeatCount="indefinite"/></line>
    <line x1="260" y1="280" x2="430" y2="120"><animate attributeName="opacity" values="0.1;0.35;0.1" dur="5.3s" repeatCount="indefinite"/></line>
    <line x1="260" y1="280" x2="430" y2="230"><animate attributeName="opacity" values="0.18;0.52;0.18" dur="3.4s" repeatCount="indefinite"/></line>
    <line x1="260" y1="280" x2="430" y2="340"><animate attributeName="opacity" values="0.22;0.6;0.22" dur="2.7s" repeatCount="indefinite"/></line>
    <line x1="260" y1="280" x2="430" y2="430"><animate attributeName="opacity" values="0.14;0.44;0.14" dur="4.8s" repeatCount="indefinite"/></line>
    <line x1="260" y1="370" x2="430" y2="230"><animate attributeName="opacity" values="0.12;0.4;0.12" dur="4.3s" repeatCount="indefinite"/></line>
    <line x1="260" y1="370" x2="430" y2="340"><animate attributeName="opacity" values="0.2;0.55;0.2" dur="3.2s" repeatCount="indefinite"/></line>
    <line x1="260" y1="370" x2="430" y2="430"><animate attributeName="opacity" values="0.22;0.6;0.22" dur="2.8s" repeatCount="indefinite"/></line>
    <line x1="260" y1="460" x2="430" y2="340"><animate attributeName="opacity" values="0.15;0.48;0.15" dur="3.9s" repeatCount="indefinite"/></line>
    <line x1="260" y1="460" x2="430" y2="430"><animate attributeName="opacity" values="0.2;0.58;0.2" dur="3.0s" repeatCount="indefinite"/></line>
  </g>

  <!-- CONNECTIONS: Layer 3 -> Layer 4 -->
  <g opacity="0.2" stroke="#93c5fd" stroke-width="0.9">
    <line x1="430" y1="120" x2="590" y2="150"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.8s" repeatCount="indefinite"/></line>
    <line x1="430" y1="120" x2="590" y2="270"><animate attributeName="opacity" values="0.14;0.44;0.14" dur="3.8s" repeatCount="indefinite"/></line>
    <line x1="430" y1="120" x2="590" y2="390"><animate attributeName="opacity" values="0.08;0.3;0.08" dur="5.3s" repeatCount="indefinite"/></line>
    <line x1="430" y1="230" x2="590" y2="150"><animate attributeName="opacity" values="0.18;0.55;0.18" dur="3.3s" repeatCount="indefinite"/></line>
    <line x1="430" y1="230" x2="590" y2="270"><animate attributeName="opacity" values="0.22;0.62;0.22" dur="2.5s" repeatCount="indefinite"/></line>
    <line x1="430" y1="230" x2="590" y2="390"><animate attributeName="opacity" values="0.12;0.4;0.12" dur="4.5s" repeatCount="indefinite"/></line>
    <line x1="430" y1="340" x2="590" y2="150"><animate attributeName="opacity" values="0.1;0.35;0.1" dur="5s" repeatCount="indefinite"/></line>
    <line x1="430" y1="340" x2="590" y2="270"><animate attributeName="opacity" values="0.18;0.52;0.18" dur="3.6s" repeatCount="indefinite"/></line>
    <line x1="430" y1="340" x2="590" y2="390"><animate attributeName="opacity" values="0.22;0.62;0.22" dur="2.9s" repeatCount="indefinite"/></line>
    <line x1="430" y1="430" x2="590" y2="270"><animate attributeName="opacity" values="0.14;0.44;0.14" dur="4.1s" repeatCount="indefinite"/></line>
    <line x1="430" y1="430" x2="590" y2="390"><animate attributeName="opacity" values="0.2;0.58;0.2" dur="3.1s" repeatCount="indefinite"/></line>
  </g>

  <!-- CONNECTIONS: Layer 4 -> Layer 5 -->
  <g opacity="0.25" stroke="#bfdbfe" stroke-width="1">
    <line x1="590" y1="150" x2="720" y2="180"><animate attributeName="opacity" values="0.25;0.7;0.25" dur="2.4s" repeatCount="indefinite"/></line>
    <line x1="590" y1="150" x2="720" y2="320"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.5s" repeatCount="indefinite"/></line>
    <line x1="590" y1="270" x2="720" y2="180"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/></line>
    <line x1="590" y1="270" x2="720" y2="320"><animate attributeName="opacity" values="0.22;0.65;0.22" dur="2.7s" repeatCount="indefinite"/></line>
    <line x1="590" y1="390" x2="720" y2="180"><animate attributeName="opacity" values="0.12;0.42;0.12" dur="4.2s" repeatCount="indefinite"/></line>
    <line x1="590" y1="390" x2="720" y2="320"><animate attributeName="opacity" values="0.25;0.68;0.25" dur="2.6s" repeatCount="indefinite"/></line>
  </g>

  <!-- Animated signal pulses moving along key connections -->
  <g>
    <!-- Pulse 1: Layer 1 to 5, top path -->
    <circle r="3" fill="#60a5fa" opacity="0.9">
      <animateMotion dur="3s" repeatCount="indefinite">
        <mpath>
          <path d="M 100 100 L 260 80 L 430 120 L 590 150 L 720 180"/>
        </mpath>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.9;0;0.9;0" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Pulse 2: Middle path -->
    <circle r="2.5" fill="#93c5fd" opacity="0.8">
      <animateMotion dur="4s" begin="1s" repeatCount="indefinite">
        <mpath>
          <path d="M 100 200 L 260 280 L 430 230 L 590 270 L 720 320"/>
        </mpath>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.8;0;0.8;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>

    <!-- Pulse 3: Bottom path -->
    <circle r="2" fill="#3b82f6" opacity="0.7">
      <animateMotion dur="5s" begin="2s" repeatCount="indefinite">
        <mpath>
          <path d="M 100 400 L 260 370 L 430 340 L 590 390 L 720 320"/>
        </mpath>
      </animateMotion>
      <animate attributeName="opacity" values="0;0.7;0;0.7;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
