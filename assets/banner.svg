<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>

    <style>
      @media (prefers-color-scheme: light) {
        rect[fill="#080808"] { fill: #f8fafc !important; }
        rect[fill="url(#dots)"] { fill: url(#dots) !important; }
        rect[fill="url(#vignette)"] { fill: url(#vignette) !important; }
        rect[fill="url(#bottomFade)"] { fill: url(#bottomFade) !important; }
        radialGradient#vignette stop[stop-color="#080808"] { stop-color: #f8fafc !important; }
        radialGradient#centerGlow stop[stop-color="#080808"] { stop-color: #f8fafc !important; }
        radialGradient#centerGlow stop[stop-color="#1d4ed8"] { stop-color: #3b82f6 !important; stop-opacity: 0.08 !important; }
        linearGradient#bottomFade stop[stop-color="#080808"] { stop-color: #f8fafc !important; }
        pattern#dots circle { fill: #cbd5e1 !important; opacity: 0.65 !important; }
        g[stroke="#3b82f6"] { opacity: 0.25 !important; }
        text[fill="#ffffff"] { fill: #0f172a !important; }
        text[fill="#475569"] { fill: #64748b !important; }
        linearGradient#scanTrail stop[stop-color="#3b82f6"] { stop-color: #3b82f6 !important; }
      }
    </style>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.9" fill="#1e293b" opacity="0.55"/>
    </pattern>

    <!-- Vignette - darkens edges -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#080808" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0.88"/>
    </radialGradient>

    <!-- Center glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>

    <!-- Scan trail gradient (vertical) -->
    <linearGradient id="scanTrail" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.14"/>
    </linearGradient>

    <!-- Text glow -->
    <filter id="textGlow" x="-5%" y="-60%" width="110%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Particle glow -->
    <filter id="pGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blue line glow -->
    <filter id="lineGlow" x="-20%" y="-500%" width="140%" height="1100%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clip">
      <rect width="1200" height="420"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Base -->
    <rect width="1200" height="420" fill="#080808"/>

    <!-- Dot grid -->
    <rect width="1200" height="420" fill="url(#dots)"/>

    <!-- Vignette overlay -->
    <rect width="1200" height="420" fill="url(#vignette)"/>

    <!-- Center ambient glow -->
    <ellipse cx="600" cy="210" rx="520" ry="240" fill="url(#centerGlow)"/>

    <!-- Scanning beam (group animates up to down) -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.06;0.94;1" dur="5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,-70;0,490" dur="5s" repeatCount="indefinite"/>
      <rect x="0" y="0" width="1200" height="70" fill="url(#scanTrail)"/>
      <rect x="0" y="69" width="1200" height="1" fill="#3b82f6" opacity="0.18"/>
    </g>

    <!-- Left circuit accent -->
    <g opacity="0.1" stroke="#3b82f6" stroke-width="0.6" fill="none">
      <path d="M 90 130 L 160 130 L 160 170 L 230 170 L 230 200"/>
      <circle cx="90" cy="130" r="2.5" fill="#3b82f6" opacity="0.5"/>
      <circle cx="160" cy="130" r="1.8" fill="#3b82f6" opacity="0.4"/>
      <circle cx="230" cy="200" r="2" fill="#3b82f6" opacity="0.45"/>
      <path d="M 60 200 L 100 200 L 100 240 L 150 240"/>
      <circle cx="60" cy="200" r="1.5" fill="#3b82f6" opacity="0.35"/>
      <circle cx="150" cy="240" r="2" fill="#3b82f6" opacity="0.4"/>
      <path d="M 110 290 L 180 290"/>
      <circle cx="110" cy="290" r="1.5" fill="#3b82f6" opacity="0.3"/>
      <circle cx="180" cy="290" r="1.5" fill="#3b82f6" opacity="0.3"/>
    </g>

    <!-- Right circuit accent -->
    <g opacity="0.1" stroke="#3b82f6" stroke-width="0.6" fill="none">
      <path d="M 1110 130 L 1040 130 L 1040 170 L 970 170 L 970 200"/>
      <circle cx="1110" cy="130" r="2.5" fill="#3b82f6" opacity="0.5"/>
      <circle cx="1040" cy="130" r="1.8" fill="#3b82f6" opacity="0.4"/>
      <circle cx="970" cy="200" r="2" fill="#3b82f6" opacity="0.45"/>
      <path d="M 1140 200 L 1100 200 L 1100 240 L 1050 240"/>
      <circle cx="1140" cy="200" r="1.5" fill="#3b82f6" opacity="0.35"/>
      <circle cx="1050" cy="240" r="2" fill="#3b82f6" opacity="0.4"/>
      <path d="M 1090 290 L 1020 290"/>
      <circle cx="1090" cy="290" r="1.5" fill="#3b82f6" opacity="0.3"/>
      <circle cx="1020" cy="290" r="1.5" fill="#3b82f6" opacity="0.3"/>
    </g>

    <!-- Corner bracket: Top-Left -->
    <g opacity="0.35">
      <line x1="22" y1="22" x2="22" y2="68" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="22" y1="22" x2="68" y2="22" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="2.5" fill="#3b82f6"/>
    </g>

    <!-- Corner bracket: Top-Right -->
    <g opacity="0.35">
      <line x1="1178" y1="22" x2="1178" y2="68" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="1178" y1="22" x2="1132" y2="22" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="1178" cy="22" r="2.5" fill="#3b82f6"/>
    </g>

    <!-- Corner bracket: Bottom-Left -->
    <g opacity="0.35">
      <line x1="22" y1="398" x2="22" y2="352" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="22" y1="398" x2="68" y2="398" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="22" cy="398" r="2.5" fill="#3b82f6"/>
    </g>

    <!-- Corner bracket: Bottom-Right -->
    <g opacity="0.35">
      <line x1="1178" y1="398" x2="1178" y2="352" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="1178" y1="398" x2="1132" y2="398" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="1178" cy="398" r="2.5" fill="#3b82f6"/>
    </g>

    <!-- Left particles -->
    <g filter="url(#pGlow)">
      <circle cx="58" cy="90" r="1.8" fill="#3b82f6" opacity="0.65">
        <animate attributeName="opacity" values="0.65;0.25;0.65" dur="3.8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="90;80;90" dur="3.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="88" cy="140" r="1.2" fill="#60a5fa" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.15;0.5" dur="5.2s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="140;130;140" dur="5.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="42" cy="200" r="1.5" fill="#93c5fd" opacity="0.45">
        <animate attributeName="opacity" values="0.45;0.12;0.45" dur="6.1s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="200;190;200" dur="6.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="118" cy="280" r="1" fill="#3b82f6" opacity="0.35">
        <animate attributeName="opacity" values="0.35;0.1;0.35" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="65" cy="335" r="1.4" fill="#60a5fa" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.08;0.3" dur="7s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="335;325;335" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="100" cy="380" r="0.9" fill="#3b82f6" opacity="0.25">
        <animate attributeName="opacity" values="0.25;0.06;0.25" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Right particles -->
    <g filter="url(#pGlow)">
      <circle cx="1142" cy="90" r="1.8" fill="#3b82f6" opacity="0.65">
        <animate attributeName="opacity" values="0.65;0.25;0.65" dur="4.2s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="90;80;90" dur="4.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1112" cy="150" r="1.2" fill="#60a5fa" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.15;0.5" dur="5.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="150;140;150" dur="5.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1158" cy="210" r="1.5" fill="#93c5fd" opacity="0.45">
        <animate attributeName="opacity" values="0.45;0.12;0.45" dur="6.4s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="210;200;210" dur="6.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1082" cy="275" r="1" fill="#3b82f6" opacity="0.35">
        <animate attributeName="opacity" values="0.35;0.1;0.35" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1135" cy="340" r="1.4" fill="#60a5fa" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.08;0.3" dur="7.3s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="340;330;340" dur="7.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1100" cy="385" r="0.9" fill="#3b82f6" opacity="0.25">
        <animate attributeName="opacity" values="0.25;0.06;0.25" dur="8.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- ─────── MAIN TYPOGRAPHY ─────── -->

    <!-- BENEDICT -->
    <text
      x="600" y="202"
      font-family="'SF Pro Display','Inter','Helvetica Neue',Arial,sans-serif"
      font-size="108" font-weight="800" letter-spacing="28"
      text-anchor="middle" fill="#ffffff"
      filter="url(#textGlow)"
      opacity="0"
    >
      BENEDICT
      <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
    </text>

    <!-- PATRICK (blue, small tracked) -->
    <text
      x="600" y="240"
      font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
      font-size="15" font-weight="300" letter-spacing="22"
      text-anchor="middle" fill="#3b82f6"
      opacity="0"
    >
      PATRICK
      <animate attributeName="opacity" values="0;0.9" dur="0.5s" begin="0.9s" fill="freeze"/>
    </text>

    <!-- Blue accent underline — draws in from center -->
    <line x1="600" y1="257" x2="600" y2="257" stroke="#3b82f6" stroke-width="0.8" opacity="0" filter="url(#lineGlow)">
      <animate attributeName="x1" values="600;438" dur="0.55s" begin="1.1s" fill="freeze"/>
      <animate attributeName="x2" values="600;762" dur="0.55s" begin="1.1s" fill="freeze"/>
      <animate attributeName="opacity" values="0;0.55" dur="0.35s" begin="1.1s" fill="freeze"/>
    </line>

    <!-- End dots on accent line -->
    <circle cx="438" cy="257" r="2.5" fill="#3b82f6" opacity="0">
      <animate attributeName="opacity" values="0;0.6" dur="0.2s" begin="1.65s" fill="freeze"/>
    </circle>
    <circle cx="762" cy="257" r="2.5" fill="#3b82f6" opacity="0">
      <animate attributeName="opacity" values="0;0.6" dur="0.2s" begin="1.65s" fill="freeze"/>
    </circle>

    <!-- Subtitle -->
    <text
      x="600" y="300"
      font-family="'SF Pro Text','Inter','Helvetica Neue',Arial,sans-serif"
      font-size="10.5" font-weight="400" letter-spacing="4.8"
      text-anchor="middle" fill="#475569"
      opacity="0"
    >
      ENGINEERING THE FUTURE WITH AI, SECURITY &amp; DEEP TECH
      <animate attributeName="opacity" values="0;0.95" dur="0.5s" begin="1.5s" fill="freeze"/>
    </text>

    <!-- Subtle bottom fade -->
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080808" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0.5"/>
    </linearGradient>
    <rect x="0" y="360" width="1200" height="60" fill="url(#bottomFade)"/>
  </g>
</svg>
