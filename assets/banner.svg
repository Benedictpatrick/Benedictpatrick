<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f0f14;stop-opacity:1"/>
    </linearGradient>

    <!-- Blue glow filter -->
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Particle glow -->
    <filter id="particleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="bannerClip">
      <rect width="1200" height="400" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Background -->
    <rect width="1200" height="400" fill="url(#bgGrad)"/>

    <!-- Subtle grid lines -->
    <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
      <line x1="0" y1="100" x2="1200" y2="100"/>
      <line x1="0" y1="200" x2="1200" y2="200"/>
      <line x1="0" y1="300" x2="1200" y2="300"/>
      <line x1="300" y1="0" x2="300" y2="400"/>
      <line x1="600" y1="0" x2="600" y2="400"/>
      <line x1="900" y1="0" x2="900" y2="400"/>
    </g>

    <!-- Floating particles - left cluster -->
    <g filter="url(#particleGlow)">
      <circle cx="60" cy="80" r="1.5" fill="#3b82f6" opacity="0.7">
        <animate attributeName="cy" values="80;70;80" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="90" cy="120" r="1" fill="#60a5fa" opacity="0.5">
        <animate attributeName="cy" values="120;108;120" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.2;0.5" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="45" cy="160" r="1.2" fill="#93c5fd" opacity="0.4">
        <animate attributeName="cy" values="160;148;160" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="110" cy="60" r="0.8" fill="#3b82f6" opacity="0.6">
        <animate attributeName="cy" values="60;50;60" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="30" cy="200" r="1.5" fill="#2563eb" opacity="0.35">
        <animate attributeName="cy" values="200;188;200" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="140" cy="180" r="0.8" fill="#60a5fa" opacity="0.5">
        <animate attributeName="cy" values="180;168;180" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="75" cy="280" r="1" fill="#3b82f6" opacity="0.3">
        <animate attributeName="cy" values="280;268;280" dur="5.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="130" cy="320" r="1.2" fill="#93c5fd" opacity="0.25">
        <animate attributeName="cy" values="320;308;320" dur="6.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Floating particles - right cluster -->
    <g filter="url(#particleGlow)">
      <circle cx="1140" cy="80" r="1.5" fill="#3b82f6" opacity="0.7">
        <animate attributeName="cy" values="80;70;80" dur="4.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1110" cy="130" r="1" fill="#60a5fa" opacity="0.5">
        <animate attributeName="cy" values="130;118;130" dur="5.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1155" cy="170" r="1.2" fill="#93c5fd" opacity="0.4">
        <animate attributeName="cy" values="170;158;170" dur="6.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1090" cy="60" r="0.8" fill="#3b82f6" opacity="0.6">
        <animate attributeName="cy" values="60;48;60" dur="3.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1170" cy="220" r="1.5" fill="#2563eb" opacity="0.35">
        <animate attributeName="cy" values="220;208;220" dur="7.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1060" cy="180" r="0.8" fill="#60a5fa" opacity="0.5">
        <animate attributeName="cy" values="180;168;180" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1125" cy="290" r="1" fill="#3b82f6" opacity="0.3">
        <animate attributeName="cy" values="290;278;290" dur="5.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1070" cy="330" r="1.2" fill="#93c5fd" opacity="0.25">
        <animate attributeName="cy" values="330;318;330" dur="6.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Scattered mid particles -->
    <g filter="url(#particleGlow)" opacity="0.25">
      <circle cx="250" cy="50" r="0.8" fill="#3b82f6">
        <animate attributeName="opacity" values="0.25;0.1;0.25" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="400" cy="30" r="0.6" fill="#60a5fa">
        <animate attributeName="opacity" values="0.2;0.05;0.2" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="800" cy="370" r="0.8" fill="#3b82f6">
        <animate attributeName="opacity" values="0.2;0.08;0.2" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="950" cy="350" r="0.6" fill="#93c5fd">
        <animate attributeName="opacity" values="0.25;0.08;0.25" dur="10s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Radial glow behind text -->
    <ellipse cx="600" cy="200" rx="380" ry="140" fill="#1d4ed8" opacity="0.04"/>
    <ellipse cx="600" cy="200" rx="220" ry="80" fill="#3b82f6" opacity="0.05"/>

    <!-- Main title: BENEDICT -->
    <text
      x="600"
      y="185"
      font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
      font-size="96"
      font-weight="800"
      letter-spacing="28"
      text-anchor="middle"
      fill="#ffffff"
      filter="url(#textGlow)"
    >
      BENEDICT
      <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
    </text>

    <!-- Subtitle -->
    <text
      x="600"
      y="235"
      font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
      font-size="15"
      font-weight="300"
      letter-spacing="4"
      text-anchor="middle"
      fill="#94a3b8"
      opacity="0"
    >
      ENGINEERING THE FUTURE WITH AI, SECURITY &amp; DEEP TECH
      <animate attributeName="opacity" values="0;0.85" dur="0.8s" begin="0.9s" fill="freeze"/>
    </text>

    <!-- Accent line under title -->
    <line x1="480" y1="252" x2="720" y2="252" stroke="#3b82f6" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.6" dur="0.6s" begin="1.4s" fill="freeze"/>
    </line>
    <line x1="480" y1="252" x2="720" y2="252" stroke="#60a5fa" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0.3" dur="0.6s" begin="1.4s" fill="freeze"/>
      <filter>
        <feGaussianBlur stdDeviation="2"/>
      </filter>
    </line>

    <!-- Corner accent top-left -->
    <g opacity="0.25">
      <line x1="20" y1="20" x2="60" y2="20" stroke="#3b82f6" stroke-width="1"/>
      <line x1="20" y1="20" x2="20" y2="60" stroke="#3b82f6" stroke-width="1"/>
    </g>

    <!-- Corner accent top-right -->
    <g opacity="0.25">
      <line x1="1180" y1="20" x2="1140" y2="20" stroke="#3b82f6" stroke-width="1"/>
      <line x1="1180" y1="20" x2="1180" y2="60" stroke="#3b82f6" stroke-width="1"/>
    </g>

    <!-- Corner accent bottom-left -->
    <g opacity="0.25">
      <line x1="20" y1="380" x2="60" y2="380" stroke="#3b82f6" stroke-width="1"/>
      <line x1="20" y1="380" x2="20" y2="340" stroke="#3b82f6" stroke-width="1"/>
    </g>

    <!-- Corner accent bottom-right -->
    <g opacity="0.25">
      <line x1="1180" y1="380" x2="1140" y2="380" stroke="#3b82f6" stroke-width="1"/>
      <line x1="1180" y1="380" x2="1180" y2="340" stroke="#3b82f6" stroke-width="1"/>
    </g>

    <!-- Bottom border -->
    <rect x="0" y="394" width="1200" height="6" fill="url(#bgGrad)" opacity="0.9"/>
    <line x1="0" y1="398" x2="1200" y2="398" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
